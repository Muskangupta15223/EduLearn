x-build-base: &build-base
  context: .
  dockerfile: Dockerfile

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  db-net:
    driver: bridge

volumes:
  mysql_data:

services:
  # Consolidated Database for All Services
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: unless-stopped
    logging: *default-logging
    networks:
      - db-net
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${SPRING_DATASOURCE_PASSWORD}"
    volumes:
      - ./init-local-databases.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    command: --innodb-buffer-pool-size=256M
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: olp-redis
    restart: unless-stopped
    logging: *default-logging
    networks:
      - db-net
      - backend-net
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 256M

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    restart: unless-stopped
    logging: *default-logging
    networks:
      - db-net
      - backend-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    deploy:
      resources:
        limits:
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    restart: unless-stopped
    logging: *default-logging
    networks:
      - db-net
      - backend-net
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms512M"
    deploy:
      resources:
        limits:
          memory: 1G

  discovery-service:
    image: ${SERVICE_IMAGE_PREFIX:-muskangupta8239}/discovery-service:latest
    container_name: discovery-service
    restart: unless-stopped
    logging: *default-logging
    networks:
      - backend-net
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx256m -Xms256m
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  config-service:
    image: ${SERVICE_IMAGE_PREFIX:-muskangupta8239}/config-service:latest
    container_name: config-service
    restart: unless-stopped
    logging: *default-logging
    networks:
      - backend-net
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/config-repo:ro
    environment:
      - SPRING_PROFILES_ACTIVE=native,docker
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:/config-repo
      - JAVA_OPTS=-Xmx256m -Xms256m
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  api-gateway:
    image: ${SERVICE_IMAGE_PREFIX:-muskangupta8239}/api-gateway:latest
    container_name: api-gateway
    restart: unless-stopped
    logging: *default-logging
    networks:
      - frontend-net
      - backend-net
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - JWT_SECRET=${JWT_SECRET}
      - JAVA_OPTS=-Xmx256m -Xms256m
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  auth-service:
    image: ${SERVICE_IMAGE_PREFIX:-muskangupta8239}/auth-service:latest
    container_name: auth-service
    restart: unless-stopped
    logging: *default-logging
    networks:
      - backend-net
      - db-net
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - KAFKA_SERVERS=kafka:29092
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - JAVA_OPTS=-Xmx256m -Xms256m
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      mysql-db:
        condition: service_healthy
      config-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  user-service:
    image: ${SERVICE_IMAGE_PREFIX:-muskangupta8239}/user-service:latest
    container_name: user-service
    restart: unless-stopped
    logging: *default-logging
    networks:
      - backend-net
      - db-net
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - KAFKA_SERVERS=kafka:29092
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JAVA_OPTS=-Xmx256m -Xms256m
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      mysql-db:
        condition: service_healthy
      config-service:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  course-service:
    image: ${SERVICE_IMAGE_PREFIX:-muskangupta8239}/course-service:latest
    container_name: course-service
    restart: unless-stopped
    logging: *default-logging
    networks:
      - backend-net
      - db-net
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - KAFKA_SERVERS=kafka:29092
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JAVA_OPTS=-Xmx256m -Xms256m
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      mysql-db:
        condition: service_healthy
      config-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  enrollment-service:
    image: ${SERVICE_IMAGE_PREFIX:-muskangupta8239}/enrollment-service:latest
    container_name: enrollment-service
    restart: unless-stopped
    logging: *default-logging
    networks:
      - backend-net
      - db-net
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - KAFKA_SERVERS=kafka:29092
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JAVA_OPTS=-Xmx256m -Xms256m
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      mysql-db:
        condition: service_healthy
      config-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  payment-service:
    image: ${SERVICE_IMAGE_PREFIX:-muskangupta8239}/payment-service:latest
    container_name: payment-service
    restart: unless-stopped
    logging: *default-logging
    networks:
      - backend-net
      - db-net
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - JAVA_OPTS=-Xmx256m -Xms256m
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      mysql-db:
        condition: service_healthy
      redis:
        condition: service_started
      config-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  notification-service:
    image: ${SERVICE_IMAGE_PREFIX:-muskangupta8239}/notification-service:latest
    container_name: notification-service
    restart: unless-stopped
    logging: *default-logging
    networks:
      - backend-net
      - db-net
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - JAVA_OPTS=-Xmx256m -Xms256m
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      mysql-db:
        condition: service_healthy
      config-service:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  admin-server:
    image: ${SERVICE_IMAGE_PREFIX:-muskangupta8239}/admin-server:latest
    container_name: admin-server
    restart: unless-stopped
    logging: *default-logging
    networks:
      - backend-net
    ports:
      - "9090:9090"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - JAVA_OPTS=-Xmx256m -Xms256m
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-service:
        condition: service_started
      config-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    image: ${SERVICE_IMAGE_PREFIX:-muskangupta8239}/frontend:latest
    container_name: frontend
    restart: unless-stopped
    logging: *default-logging
    networks:
      - frontend-net
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_started
    environment:
      - VITE_API_GATEWAY_URL=http://localhost:8080
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
