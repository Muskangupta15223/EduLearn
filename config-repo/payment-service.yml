server:
  port: 8087

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/payment_db
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD}
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: update
---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://mysql-db:3306/payment_db
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD}
  data:
    redis:
      host: redis
  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}
