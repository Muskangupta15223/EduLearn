server:
  port: 8083

spring:
  application:
    name: course-service
  config:
    import: optional:file:../.env[.properties],optional:file:../../.env[.properties],optional:file:.env[.properties],optional:configserver:http://localhost:8888

  datasource:
    url: jdbc:mysql://localhost:3306/course_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info
---
# Docker profile
spring:
  config:
    activate:
      on-profile: docker
    import: optional:configserver:http://config-service:8888

  datasource:
    url: jdbc:mysql://mysql-db:3306/course_db

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka
